<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER RX Indonesia v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f4f6f9;
  --surface:  #ffffff;
  --surface2: #f0f2f5;
  --surface3: #e8eaed;
  --border:   #d1d5db;
  --border2:  #b8bcc5;

  --text:     #111827;
  --text2:    #374151;
  --text3:    #6b7280;
  --text4:    #9ca3af;

  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --red-bdr:  #fecaca;

  --orange:   #d97706;
  --orange-bg:#fffbeb;
  --orange-bdr:#fde68a;

  --green:    #059669;
  --green-bg: #ecfdf5;
  --green-bdr:#a7f3d0;

  --blue:     #2563eb;
  --blue-bg:  #eff6ff;
  --blue-bdr: #bfdbfe;

  --purple:   #7c3aed;
  --purple-bg:#f5f3ff;
  --purple-bdr:#ddd6fe;

  --teal:     #0d9488;
  --teal-bg:  #f0fdfa;
  --teal-bdr: #99f6e4;

  --blood:    #b91c1c;

  /* category accent colors */
  --c-sed:    #7c3aed;
  --c-analg:  #d97706;
  --c-nmd:    #0d9488;
  --c-hemo:   #b91c1c;
  --c-anti:   #059669;
  --c-scen:   #2563eb;
  --c-calc:   #ea580c;

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }

/* ===== HEADER ===== */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  background: var(--red); color: #fff;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 52px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.hdr-logo { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; flex-shrink: 0; }
.hdr-sub  { font-size: 11px; opacity: 0.75; font-family: var(--mono); flex-shrink: 0; }
.hdr-sep  { flex: 1; }
.hdr-search {
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35);
  border-radius: 6px; padding: 6px 12px; color: #fff;
  font-size: 14px; font-family: var(--sans); outline: none;
  width: 200px; transition: background 0.2s;
}
.hdr-search::placeholder { color: rgba(255,255,255,0.6); }
.hdr-search:focus { background: rgba(255,255,255,0.3); }
.burger {
  display: none; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 18px; line-height: 1;
}

/* ===== CATEGORY BAR ===== */
.catbar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 290;
  background: var(--surface); border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; scrollbar-width: none;
  height: 46px; align-items: stretch;
}
.catbar::-webkit-scrollbar { display: none; }
.ctab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; font-size: 13px; font-weight: 600;
  color: var(--text3); cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; white-space: nowrap;
  transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
}
.ctab:hover { color: var(--text); }
.ctab.active { color: var(--text); border-bottom-color: var(--cat-color, var(--red)); }
.ctab .ct-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cat-color, var(--red)); }

/* ===== LAYOUT ===== */
.layout {
  position: fixed; top: 98px; bottom: 0; left: 0; right: 0;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sb-grp { border-bottom: 1px solid var(--border); }
.sb-grp-lbl {
  padding: 8px 12px 5px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--text4); text-transform: uppercase;
  background: var(--surface2); border-bottom: 1px solid var(--border);
}
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--surface2);
  transition: background 0.1s;
}
.sb-item:hover { background: var(--surface2); }
.sb-item.active { background: #fff3f3; border-left: 3px solid var(--red); padding-left: 9px; }
.sb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sb-name { font-size: 14px; font-weight: 600; color: var(--text2); }
.sb-class { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ===== MAIN ===== */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.content { padding: 20px 22px 48px; max-width: 860px; }

/* ===== DRUG HEADER ===== */
.drug-hdr { margin-bottom: 20px; }
.drug-title { font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; line-height: 1.1; }
.drug-sub { font-size: 14px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }
.drug-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.chip-cat  { background: var(--cat-bg,#f0f2f5); color: var(--cat-col,#374151); border: 1px solid var(--cat-bdr,#d1d5db); }
.chip-route { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); font-family: var(--mono); font-size: 11px; }
.chip-avail { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-bdr); }

/* ===== SECTIONS ===== */
.sec {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
}
.sec-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px; cursor: pointer; user-select: none;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.sec-hdr:hover { background: var(--surface3); }
.sec-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 0.2px; flex: 1; }
.sec-icon  { font-size: 15px; }
.sec-toggle { color: var(--text4); font-size: 12px; transition: transform 0.2s; }
.sec.collapsed .sec-toggle { transform: rotate(-90deg); }
.sec-body { padding: 14px; }
.sec.collapsed .sec-body { display: none; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* ===== LISTS ===== */
.ilist { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.ilist li {
  padding: 7px 12px; border-radius: 6px; font-size: 14px; line-height: 1.5;
  display: flex; align-items: flex-start; gap: 8px;
}
.ilist li::before { content: ''; width: 3px; min-height: 18px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; background: var(--border2); }
.li-g li::before { background: var(--green); }
.li-r li::before { background: var(--red); }
.li-r li { background: var(--red-bg); color: #991b1b; }
.li-y li::before { background: var(--orange); }
.li-y li { background: var(--orange-bg); color: var(--orange); }
.li-b li::before { background: var(--teal); }
.li-b li { background: var(--teal-bg); }
.li-p li::before { background: var(--purple); }
.li-p li { background: var(--purple-bg); color: var(--purple); }

/* ===== DOSE TABLE ===== */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 6px; border: 1px solid var(--border); }
.dtbl { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 520px; }
.dtbl thead th { background: var(--surface2); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text3); border-bottom: 2px solid var(--border); white-space: nowrap; }
.dtbl tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13.5px; }
.dtbl tbody tr:last-child td { border-bottom: none; }
.dtbl tbody tr:hover td { background: var(--surface2); }
.td-pop  { color: var(--blue); font-weight: 600; font-size: 13px; }
.td-dose { color: var(--red); font-weight: 700; font-family: var(--mono); font-size: 13px; }
.td-tit  { color: var(--teal); font-size: 12.5px; }
.td-note { color: var(--text3); font-size: 12px; }
.td-ind  { color: var(--text2); }

/* ===== MONITORING GRID ===== */
.mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.mon-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.mon-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase; }
.mon-val { font-size: 14px; font-weight: 700; color: var(--green); font-family: var(--mono); }
.mon-note { font-size: 12px; color: var(--text3); margin-top: 3px; }

/* ===== ALERTS ===== */
.alert { padding: 11px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; border-left: 4px solid; margin-bottom: 10px; }
.a-red    { background: var(--red-bg);    border-color: var(--red);    color: #991b1b; }
.a-orange { background: var(--orange-bg); border-color: var(--orange); color: #92400e; }
.a-green  { background: var(--green-bg);  border-color: var(--green);  color: #065f46; }
.a-blue   { background: var(--blue-bg);   border-color: var(--blue);   color: #1e40af; }
.a-teal   { background: var(--teal-bg);   border-color: var(--teal);   color: #134e4a; }

/* ===== OVERDOSE BOX ===== */
.od-box { background: var(--red-bg); border: 1px solid var(--red-bdr); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.od-box h4 { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--red); margin-bottom: 8px; text-transform: uppercase; }
.antidote-box { background: var(--green-bg); border: 1px solid var(--green-bdr); border-radius: 8px; padding: 14px; margin-top: 10px; }
.antidote-box .at-lbl { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--green); margin-bottom: 6px; text-transform: uppercase; }
.antidote-box p { font-size: 14px; line-height: 1.6; color: #065f46; }
.titrate-box { background: var(--orange-bg); border: 1px solid var(--orange-bdr); border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.7; color: #92400e; }

/* ===== SCENARIO ===== */
.scen-title { font-size: 26px; font-weight: 800; color: var(--blue); line-height: 1.2; margin-bottom: 4px; }
.scen-sub { font-size: 14px; color: var(--text3); margin-bottom: 12px; }
.step { display: flex; gap: 12px; margin-bottom: 13px; align-items: flex-start; }
.step-n { width: 26px; height: 26px; border-radius: 50%; background: var(--red); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.step-n.drug { background: var(--orange); }
.step-txt { font-size: 14px; line-height: 1.6; color: var(--text2); flex: 1; }
.step-txt.drug { color: var(--orange); font-weight: 600; }

/* ===== CALCULATOR ===== */
.calc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
.calc-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.calc-subtitle { font-size: 13px; color: var(--text3); font-family: var(--mono); margin-bottom: 18px; }
.calc-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.cf label { display: block; font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase; }
.cf input, .cf select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 10px 12px; font-size: 15px;
  color: var(--text); font-family: var(--sans); outline: none; transition: border-color 0.2s;
}
.cf input:focus, .cf select:focus { border-color: var(--blue); background: #fff; }
.calc-btn {
  width: 100%; background: var(--red); border: none; border-radius: 8px;
  padding: 13px; color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background 0.15s; letter-spacing: 0.3px;
}
.calc-btn:hover { background: #b91c1c; }
.result-drug {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
}
.rdrug-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
}
.rdrug-name { font-size: 15px; font-weight: 700; color: var(--text); }
.rdrug-class { font-size: 12px; color: var(--text3); }
.rdrug-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.rdrug-row { display: flex; align-items: flex-start; gap: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--surface2); }
.rdrug-row:last-child { border-bottom: none; padding-bottom: 0; }
.rdrug-ind { font-size: 13px; color: var(--text2); flex: 1; line-height: 1.4; }
.rdrug-dose-wrap { text-align: right; flex-shrink: 0; }
.rdrug-dose { font-size: 16px; font-weight: 800; color: var(--red); font-family: var(--mono); }
.rdrug-note { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
.rdrug-flag { background: var(--orange-bg); border: 1px solid var(--orange-bdr); border-radius: 5px; padding: 5px 10px; font-size: 12px; color: var(--orange); font-weight: 600; margin-top: 4px; }

/* patient banner */
.pt-banner { background: var(--blue-bg); border: 1.5px solid var(--blue-bdr); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
.pt-item { display: flex; flex-direction: column; }
.pt-lbl { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: 1px; text-transform: uppercase; }
.pt-val { font-size: 18px; font-weight: 800; color: var(--text); font-family: var(--mono); }

/* ===== OVERLAY ===== */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 250; }
.overlay.on { display: block; }

/* ===== BOTTOM SHEET (mobile drug picker) ===== */
.bsheet {
  display: none;
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 280;
  background: #fff;
  border-radius: 18px 18px 0 0;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
  max-height: 82vh;
  flex-direction: column;
  overflow: hidden;
}
.bsheet.open { display: flex; }
.bsheet-drag {
  width: 40px; height: 5px; background: var(--border2);
  border-radius: 3px; margin: 10px auto 4px;
  flex-shrink: 0;
}
.bsheet-head {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px 10px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bsheet-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.bsheet-close {
  background: var(--surface2); border: none; border-radius: 50%;
  width: 30px; height: 30px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); line-height: 1;
}
.bsheet-srch-wrap { padding: 10px 14px 6px; flex-shrink: 0; }
.bsheet-srch {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--border); font-size: 15px;
  background: var(--surface2); color: var(--text);
  outline: none;
}
.bsheet-srch:focus { border-color: var(--blue); background: #fff; }
/* category filter pills inside sheet */
.bsheet-cats {
  display: flex; gap: 6px; padding: 6px 14px 8px;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.bsheet-cats::-webkit-scrollbar { display: none; }
.bsheet-cat {
  padding: 5px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text3); cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.bsheet-cat.active { background: var(--red); color: #fff; border-color: var(--red); }
.bsheet-list {
  overflow-y: auto; flex: 1;
  -webkit-overflow-scrolling: touch;
}
.bsheet-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--surface2);
  cursor: pointer; transition: background 0.1s;
}
.bsheet-item:active { background: var(--surface2); }
.bsheet-item.active { background: #fef2f2; border-left: 4px solid var(--red); padding-left: 12px; }
.bsheet-iname { font-size: 15px; font-weight: 600; color: var(--text); }
.bsheet-iclass { font-size: 12px; color: var(--text3); margin-top: 1px; }
.bsheet-grp {
  padding: 8px 16px 5px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--text4); text-transform: uppercase;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
}
/* Bottom safe-area padding for iPhones */
.bsheet-list { padding-bottom: env(safe-area-inset-bottom, 16px); }

/* ===== MOBILE FAB (floating action button) ===== */
.fab {
  display: none;
  position: fixed; bottom: 20px; right: 16px;
  z-index: 200;
  background: var(--red); color: #fff;
  border: none; border-radius: 28px;
  padding: 14px 20px;
  font-size: 15px; font-weight: 700;
  box-shadow: 0 4px 18px rgba(220,38,38,0.45);
  cursor: pointer;
  align-items: center; gap: 8px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(220,38,38,0.4); }
.fab-icon { font-size: 18px; }

/* ===== MOBILE ===== */
@media (max-width: 680px) {
  .burger { display: none; } /* FAB replaces burger on mobile */
  .hdr-sub { display: none; }
  .hdr-search { width: 140px; font-size: 14px; }
  /* Hide desktop sidebar on mobile */
  .sidebar { display: none; }
  .content { padding: 14px 14px 90px; } /* bottom padding for FAB */
  .drug-title { font-size: 24px; }
  .two-col { grid-template-columns: 1fr; }
  .calc-row { grid-template-columns: 1fr 1fr; }
  .rdrug-row { flex-direction: column; gap: 4px; }
  .rdrug-dose-wrap { text-align: left; }
  /* Also hide catbar on mobile — handled inside sheet */
  .catbar { display: none; }
  .layout { top: 52px; } /* header only */
  .fab { display: flex; }
}
@media (min-width: 681px) {
  .fab { display: none !important; }
  .bsheet { display: none !important; }
}

.hidden { display: none !important; }
strong { font-weight: 700; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <button class="burger" onclick="toggleSidebar()">☰</button>
  <div class="hdr-logo">ER RX</div>
  <div class="hdr-sub">Indonesia · Critical Drug Reference</div>
  <div class="hdr-sep"></div>
  <input class="hdr-search" id="srch" type="text" placeholder="Search…" oninput="renderSidebar()">
</header>

<!-- CATEGORY BAR -->
<nav class="catbar" id="catbar"></nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- MOBILE FAB -->
<button class="fab" id="fab" onclick="openSheet()">
  <span class="fab-icon">💊</span> Browse Drugs
</button>

<!-- BOTTOM SHEET -->
<div class="bsheet" id="bsheet">
  <div class="bsheet-drag"></div>
  <div class="bsheet-head">
    <div class="bsheet-title">Select Drug or Scenario</div>
    <button class="bsheet-close" onclick="closeSheet()">×</button>
  </div>
  <div class="bsheet-srch-wrap">
    <input class="bsheet-srch" id="bsrch" type="text" placeholder="🔍  Search…" oninput="renderSheet()">
  </div>
  <div class="bsheet-cats" id="bsheetCats"></div>
  <div class="bsheet-list" id="bsheetList"></div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="content" id="mainContent"></div>
  </main>
</div>

<script>
// ================================================================
// DRUG DATA
// ================================================================
const DRUGS = [
// ─── SEDATIVES ──────────────────────────────────────────
{
  id:'midazolam', name:'Midazolam', cat:'sedative', class:'Benzodiazepine',
  routes:['IV','IM','IN','PO','PR'], avail:'Widely available — generic',
  mech:'Enhances GABA-A receptor activity → CNS depression, anxiolysis, anterograde amnesia, muscle relaxation. Onset IV 1–3 min, IM 5–15 min, IN 5–10 min.',

// ================================================================
// UTILS
// ================================================================
function r(lo, hi) { return {lo: +lo, hi: +hi}; }
function dotCls(cat) { return {sedative:'#7c3aed',analgesic:'#d97706',nmd:'#0d9488',hemostatic:'#b91c1c',antidote:'#059669'}[cat]||'#374151'; }
function catLabel(cat) { return {sedative:'SEDATIVE / INDUCTION',analgesic:'ANALGESIC',nmd:'NEUROMUSCULAR BLOCKER',hemostatic:'HEMOSTATIC',antidote:'ANTIDOTE'}[cat]||cat.toUpperCase(); }
function chipStyle(cat) {
  const m = {
    sedative:{bg:'#f5f3ff',color:'#6d28d9',bdr:'#ddd6fe'},
    analgesic:{bg:'#fffbeb',color:'#b45309',bdr:'#fde68a'},
    nmd:{bg:'#f0fdfa',color:'#0f766e',bdr:'#99f6e4'},
    hemostatic:{bg:'#fef2f2',color:'#991b1b',bdr:'#fecaca'},
    antidote:{bg:'#ecfdf5',color:'#047857',bdr:'#a7f3d0'},
  };
  const s = m[cat]||m.sedative;
  return `background:${s.bg};color:${s.color};border:1.5px solid ${s.bdr}`;
}

// ================================================================
// STATE
// ================================================================
let curCat='all', curDrug=null, curScen=null;

const CAT_DEFS = [
  {id:'all',     label:'ALL'},
  {id:'sedative',label:'Sedatives',     color:'var(--c-sed)'},
  {id:'analgesic',label:'Analgesics',   color:'var(--c-analg)'},
  {id:'nmd',     label:'NMB',           color:'var(--c-nmd)'},
  {id:'hemostatic',label:'Hemostatics', color:'var(--c-hemo)'},
  {id:'antidote',label:'Antidotes',     color:'var(--c-anti)'},
  {id:'scenario',label:'Scenarios',     color:'var(--c-scen)'},
  {id:'calculator',label:'⚖ Calc',     color:'var(--c-calc)'},
];

// ================================================================
// INIT
// ================================================================
function init() {
  buildCatBar();
  renderSidebar();
  // auto-select first drug
  if (DRUGS.length) showDrug(DRUGS[0].id);
}

function buildCatBar() {
  const bar = document.getElementById('catbar');
  CAT_DEFS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ctab' + (c.id==='all'?' active':'');
    btn.dataset.id = c.id;
    btn.style.setProperty('--cat-color', c.color||'var(--red)');
    btn.innerHTML = c.id!=='all'&&c.id!=='calculator'&&c.id!=='scenario'
      ? `<span class="ct-dot"></span>${c.label}`
      : c.label;
    btn.onclick = () => selectCat(c.id);
    bar.appendChild(btn);
  });
}

function selectCat(id) {
  curCat = id;
  document.querySelectorAll('.ctab').forEach(b => {
    const cdef = CAT_DEFS.find(c=>c.id===b.dataset.id);
    b.style.setProperty('--cat-color', cdef?.color||'var(--red)');
    b.classList.toggle('active', b.dataset.id===id);
  });
  curDrug = null; curScen = null;
  renderSidebar();
  if (id==='calculator') { showCalc(); return; }
  // auto-show first item in category
  if (id==='scenario') {
    if (SCENARIOS.length) showScenario(SCENARIOS[0].id);
    return;
  }
  const first = id==='all' ? DRUGS[0] : DRUGS.find(d=>d.cat===id);
  if (first) showDrug(first.id);
}

// ================================================================
// SIDEBAR
// ================================================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const q = (document.getElementById('srch').value||'').toLowerCase();
  sb.innerHTML = '';

  if (curCat==='calculator') return;

  if (curCat==='scenario') {
    [{label:'COMMON',common:true},{label:'RARE / SPECIFIC',common:false}].forEach(grp => {
      const items = SCENARIOS.filter(s=>s.common===grp.common&&(q===''||s.title.toLowerCase().includes(q)||s.sub.toLowerCase().includes(q)));
      if (!items.length) return;
      const lbl = document.createElement('div');
      lbl.className='sb-grp-lbl'; lbl.textContent=grp.label;
      sb.appendChild(lbl);
      items.forEach(s=>{
        const el=document.createElement('div');
        el.className='sb-item'+(curScen===s.id?' active':'');
        el.onclick=()=>{ showScenario(s.id); closeSidebar(); };
        el.innerHTML=`<div class="sb-dot" style="background:var(--c-scen)"></div><div><div class="sb-name" style="font-size:13px">${s.title}</div><div class="sb-class" style="white-space:normal;line-height:1.3">${s.sub.substring(0,45)}…</div></div>`;
        sb.appendChild(el);
      });
    });
    return;
  }

  const groups = ['sedative','analgesic','nmd','hemostatic','antidote'];
  const groupLabels = {sedative:'SEDATIVES / INDUCTION',analgesic:'ANALGESICS',nmd:'NEUROMUSCULAR BLOCKERS',hemostatic:'HEMOSTATICS',antidote:'ANTIDOTES'};
  groups.forEach(cat => {
    if (curCat!=='all'&&curCat!==cat) return;
    const items = DRUGS.filter(d=>d.cat===cat&&(q===''||d.name.toLowerCase().includes(q)||d.class.toLowerCase().includes(q)));
    if (!items.length) return;
    const lbl=document.createElement('div');
    lbl.className='sb-grp-lbl'; lbl.textContent=groupLabels[cat];
    sb.appendChild(lbl);
    items.forEach(d=>{
      const el=document.createElement('div');
      el.className='sb-item'+(curDrug===d.id?' active':'');
      el.onclick=()=>{ showDrug(d.id); closeSidebar(); };
      el.innerHTML=`<div class="sb-dot" style="background:${dotCls(d.cat)}"></div><div><div class="sb-name">${d.name}</div><div class="sb-class">${d.class}</div></div>`;
      sb.appendChild(el);
    });
  });
}

// SHOW DRUG

  curDrug=id; curScen=null;

  const d = DRUGS.find(x=>x.id===id);

  const routes = d.routes.map(r=>`<span class="chip chip-route">${r}</span>`).join('');
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
<div class="drug-hdr">
  <div class="drug-title">${d.name}</div>
  <div class="drug-sub">${d.class}</div>
  <div class="drug-meta">
    <span class="chip" style="${chipStyle(d.cat)}">${catLabel(d.cat)}</span>
    ${routes}
    <span class="chip chip-avail">📦 ${d.avail}</span>
  </div>
</div>
<div>
${sec('⚙️','MECHANISM OF ACTION',`<p style="font-size:14px;line-height:1.7;color:var(--text2)">${d.mech}</p>`)}
<div class="two-col">
${sec('✅','INDICATIONS',`<ul class="ilist li-g">${d.indications.map(i=>`<li>${i}</li>`).join('')}</ul>`)}

${sec('💊','DOSING BY POPULATION',`<div class="tbl-wrap"><table class="dtbl">
<thead><tr><th>POPULATION</th><th>INDICATION</th><th>DOSE</th><th>TITRATION</th><th>NOTES</th></tr></thead>
<tbody>${d.doses.map(row=>`<tr>
  <td class="td-pop">${row.pop}</td>

  <td class="td-dose">${row.dose}</td>

</tr>`).join('')}</tbody>

${sec('📈','WHEN & HOW TO TITRATE',`<div class="titrate-box"><strong>Titration Guide:</strong> ${d.titrate}</div>`)}

${sec('☠️','OVERDOSE, TOXICITY & ANTIDOTES',`
<div class="od-box"><h4>⚠ SIGNS OF OVERDOSE / TOXICITY</h4><ul class="ilist li-r">${d.overdose.signs.map(s=>`<li>${s}</li>`).join('')}</ul></div>

<ul class="ilist li-y">${d.overdose.mgmt.map(m=>`<li>${m}</li>`).join('')}</ul>
<div class="antidote-box"><div class="at-lbl">🧪 ANTIDOTE / REVERSAL AGENT</div><p>${d.overdose.antidote}</p></div>
`)}
</div>`;
}

function sec(icon, title, body, open=true) {
  return `<div class="sec">
    <div class="sec-hdr" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="sec-icon">${icon}</span>
      <span class="sec-title">${title}</span>
      <span class="sec-toggle">▾</span>
    </div>
    <div class="sec-body">${body}</div>
  </div>`;
}

function runCalc() {
  const w = parseFloat(document.getElementById('cw').value);
  const yrRaw = document.getElementById('cay').value;
  const moRaw = document.getElementById('cam').value;
  const cat = document.getElementById('ccat').value;
  const out = document.getElementById('calcOut');

  if (!w || w<0.5 || w>300) {
    out.innerHTML=`<div class="alert a-orange">⚠ Please enter a valid weight (0.5–300 kg).</div>`;
    return;
  }

  const ageYears = yrRaw!=='' ? parseFloat(yrRaw) : null;
  const ageMonths = moRaw!=='' ? parseFloat(moRaw) : null;
  const ageInYears = ageYears!==null ? ageYears + (ageMonths||0)/12 : (ageMonths!==null ? ageMonths/12 : null);

  // Determine age group label
  let ageLabel = '';
  if (ageInYears!==null) {
    if (ageInYears < 1/12) ageLabel = 'NEONATE (<1 month)';
    else if (ageInYears < 1) ageLabel = `INFANT (${Math.round(ageInYears*12)} months)`;
    else if (ageInYears < 2) ageLabel = `TODDLER (${Math.floor(ageInYears)}yr ${ageMonths||Math.round((ageInYears%1)*12)}mo)`;
    else if (ageInYears < 12) ageLabel = `CHILD (${Math.floor(ageInYears)} yr)`;
    else if (ageInYears < 18) ageLabel = `ADOLESCENT (${Math.floor(ageInYears)} yr)`;
    else if (ageInYears > 65) ageLabel = `ELDERLY (${Math.floor(ageInYears)} yr)`;
    else ageLabel = `ADULT (${Math.floor(ageInYears)} yr)`;
  }

  // Age-based clinical flag
  let ageAlert = '';
  if (ageInYears!==null) {
    if (ageInYears < 1/12) ageAlert='NEONATE: Use highest succinylcholine mg/kg (3 mg/kg). Atropine pre-treatment mandatory. Consult specialist for all sedation.';
    else if (ageInYears < 1) ageAlert='INFANT: Succinylcholine 3 mg/kg. Ketamine IM 4–5 mg/kg. Atropine 0.02 mg/kg before laryngoscopy. Higher mg/kg for most drugs than adults.';
    else if (ageInYears < 12) ageAlert='CHILD: Succinylcholine 2 mg/kg (NOT 1.5 mg/kg). Ketamine IM 4–5 mg/kg preferred for procedures. Higher propofol induction doses than adults.';
    else if (ageInYears >= 12 && ageInYears < 18) ageAlert='ADOLESCENT: Use weight-based adult dosing for most drugs. Tramadol not recommended <12yr.';
    else if (ageInYears > 65) ageAlert='ELDERLY (>65yr): Reduce ALL sedative and opioid doses 30–50%. Significant hypotension risk with propofol. Prolonged benzodiazepine effect. Ketorolac max 15 mg/dose.';
  }

  const drugs = DRUGS.filter(d=>(cat==='all'||d.cat===cat)&&d.calc&&d.calc.length>0);

  let html = `<div class="pt-banner">
    <div class="pt-item"><div class="pt-lbl">Weight</div><div class="pt-val">${w} kg</div></div>
    ${ageLabel ? `<div class="pt-item"><div class="pt-lbl">Age Group</div><div class="pt-val" style="font-size:15px">${ageLabel}</div></div>` : ''}
  </div>`;

  if (ageAlert) html += `<div class="alert a-orange" style="margin-bottom:14px"><strong>⚠ Age-based note:</strong> ${ageAlert}</div>`;

  drugs.forEach(d => {
    const rows = d.calc.map(cd => {
      const res = cd.f(w, ageInYears);
      const doseStr = res.lo===res.hi ? `${res.lo}` : `${res.lo}–${res.hi}`;
      const flag = cd.flag ? cd.flag(w, ageInYears) : null;
      return `<div class="rdrug-row">
        <div class="rdrug-ind">${cd.ind}</div>
        <div class="rdrug-dose-wrap">
          <div class="rdrug-dose">${doseStr} <span style="font-size:13px;font-weight:600;font-family:var(--sans);color:var(--text3)">${cd.u}</span></div>
          ${cd.note?`<div class="rdrug-note">${cd.note}</div>`:''}
          ${flag?`<div class="rdrug-flag">⚠ ${flag}</div>`:''}
        </div>
      </div>`;
    }).join('');
    html+=`<div class="result-drug">
      <div class="rdrug-hdr">
        <div class="sb-dot" style="background:${dotCls(d.cat)};width:10px;height:10px;flex-shrink:0"></div>
        <div><div class="rdrug-name">${d.name}</div><div class="rdrug-class">${d.class}</div></div>
      </div>
      <div class="rdrug-body">${rows}</div>
    </div>`;
  });

  html+=`<div class="alert a-orange" style="margin-top:6px">⚠ These are calculated reference doses. Always adjust for clinical context, organ function, drug interactions, and institutional guidelines.</div>`;
  out.innerHTML=html;
  out.scrollIntoView({behavior:'smooth',block:'start'});
}

// ================================================================
// BOTTOM SHEET (mobile)
// ================================================================
let sheetCat = 'all';

const SHEET_CATS = [
  {id:'all',label:'All'},
  {id:'sedative',label:'Sedatives'},
  {id:'analgesic',label:'Analgesics'},
  {id:'nmd',label:'NMB'},
  {id:'hemostatic',label:'Hemostatics'},
  {id:'antidote',label:'Antidotes'},
  {id:'scenario',label:'Scenarios'},
  {id:'calculator',label:'⚖ Calc'},
];

function buildSheetCats() {
  const wrap = document.getElementById('bsheetCats');
  SHEET_CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'bsheet-cat' + (c.id==='all'?' active':'');
    btn.dataset.id = c.id;
    btn.textContent = c.label;
    btn.onclick = () => {
      sheetCat = c.id;
      wrap.querySelectorAll('.bsheet-cat').forEach(b=>b.classList.toggle('active',b.dataset.id===c.id));
      document.getElementById('bsrch').value = '';
      renderSheet();
    };
    wrap.appendChild(btn);
  });
}

function renderSheet() {
  const list = document.getElementById('bsheetList');
  const q = (document.getElementById('bsrch').value||'').toLowerCase();
  list.innerHTML = '';

  if (sheetCat === 'calculator') {
    closeSheet();
    selectCat('calculator');
    return;
  }

  const catGroups = sheetCat==='scenario'
    ? []
    : (sheetCat==='all'
        ? ['sedative','analgesic','nmd','hemostatic','antidote']
        : [sheetCat]);

  const groupLabels = {sedative:'SEDATIVES',analgesic:'ANALGESICS',nmd:'NMB',hemostatic:'HEMOSTATICS',antidote:'ANTIDOTES'};

  if (sheetCat !== 'scenario') {
    catGroups.forEach(cat => {
      const items = DRUGS.filter(d=>d.cat===cat&&(q===''||d.name.toLowerCase().includes(q)||d.class.toLowerCase().includes(q)));
      if (!items.length) return;
      const grp = document.createElement('div');
      grp.className='bsheet-grp'; grp.textContent=groupLabels[cat];
      list.appendChild(grp);
      items.forEach(d=>{
        const el=document.createElement('div');
        el.className='bsheet-item'+(curDrug===d.id?' active':'');
        el.innerHTML=`<div class="sb-dot" style="background:${dotCls(d.cat)};width:10px;height:10px;border-radius:50%;flex-shrink:0"></div><div><div class="bsheet-iname">${d.name}</div><div class="bsheet-iclass">${d.class}</div></div>`;
        el.onclick=()=>{ showDrug(d.id); closeSheet(); };
        list.appendChild(el);
      });
    });
  }

  // Scenarios
  if (sheetCat==='scenario'||sheetCat==='all') {
    const scGrp = document.createElement('div');
    scGrp.className='bsheet-grp'; scGrp.textContent='SCENARIOS';
    list.appendChild(scGrp);
    SCENARIOS.filter(s=>q===''||s.title.toLowerCase().includes(q)||s.sub.toLowerCase().includes(q))
      .forEach(s=>{
        const el=document.createElement('div');
        el.className='bsheet-item'+(curScen===s.id?' active':'');
        el.innerHTML=`<div class="sb-dot" style="background:var(--c-scen);width:10px;height:10px;border-radius:50%;flex-shrink:0"></div><div><div class="bsheet-iname">${s.title}</div><div class="bsheet-iclass">${s.sub.substring(0,48)}…</div></div>`;
        el.onclick=()=>{ showScenario(s.id); closeSheet(); };
        list.appendChild(el);
      });
  }
}

function openSheet() {
  document.getElementById('bsheet').classList.add('open');
  document.getElementById('overlay').classList.add('on');
  document.getElementById('bsrch').value='';
  renderSheet();
  setTimeout(()=>document.getElementById('bsrch').focus(),200);
}

function closeSheet() {
  document.getElementById('bsheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

// legacy — kept for desktop overlay (not used on mobile now)
function toggleSidebar() {}
function closeSidebar() { closeSheet(); }

// ================================================================
// START
// ================================================================
init();
buildSheetCats();
</script>
