<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ER RX Indonesia — Critical Drug Reference v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --surface: #0f1219;
  --surface2: #171b24;
  --surface3: #1e2330;
  --border: #252a38;
  --border2: #303548;
  --accent: #e63946;
  --accent2: #f4a261;
  --accent3: #2ec4b6;
  --accent4: #6a67ce;
  --text: #eef0f6;
  --text-muted: #8a90a8;
  --text-dim: #4a5068;
  --green: #52b788;
  --yellow: #ffd166;
  --red: #e63946;
  --purple: #9b72cf;
  --blood: #c1292e;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
  --radius: 8px;
  --sidebar-w: 240px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;}

/* ====== HEADER ====== */
.header{
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  position:fixed;top:0;left:0;right:0;
  z-index:200;
  height:54px;
}
.logo{font-family:var(--display);font-size:24px;letter-spacing:2px;color:var(--accent);line-height:1;flex-shrink:0;}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;display:block;}
.header-tag{background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.4);color:var(--accent);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:1px;flex-shrink:0;display:none;}
.search-wrap{flex:1;position:relative;max-width:360px;margin-left:auto;}
.search-bar{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px 7px 32px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color 0.2s;}
.search-bar:focus{border-color:var(--accent3);}
.search-bar::placeholder{color:var(--text-dim);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;}
.burger{display:none;background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 9px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;}

/* ====== CAT TABS ====== */
.cat-tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 8px;
  display:flex;
  gap:2px;
  overflow-x:auto;
  scrollbar-width:none;
  position:fixed;top:54px;left:0;right:0;
  z-index:190;
  height:42px;
  align-items:center;
}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{
  padding:5px 12px;
  border-radius:4px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.5px;
  cursor:pointer;
  border:1px solid transparent;
  background:transparent;
  color:var(--text-dim);
  transition:all 0.15s;
  white-space:nowrap;
  flex-shrink:0;
}
.cat-tab:hover{color:var(--text-muted);border-color:var(--border);}
.cat-tab.active{color:#fff;border-color:transparent;}
.cat-tab[data-cat="all"].active{background:var(--accent);}
.cat-tab[data-cat="sedative"].active{background:var(--accent4);}
.cat-tab[data-cat="analgesic"].active{background:var(--accent2);color:#1a1a1a;}
.cat-tab[data-cat="nmd"].active{background:var(--accent3);color:#1a1a1a;}
.cat-tab[data-cat="hemostatic"].active{background:var(--blood);}
.cat-tab[data-cat="antidote"].active{background:var(--green);color:#1a1a1a;}
.cat-tab[data-cat="scenario"].active{background:var(--purple);}
.cat-tab[data-cat="calculator"].active{background:var(--yellow);color:#1a1a1a;}

/* ====== LAYOUT ====== */
.layout{
  display:flex;
  position:fixed;
  top:96px;bottom:0;left:0;right:0;
}

/* ====== SIDEBAR ====== */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  flex-shrink:0;
  transition:transform 0.25s;
}
.sidebar-group-label{
  padding:8px 14px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--text-dim);
  background:var(--bg);
  border-bottom:1px solid var(--border);
  border-top:1px solid var(--border);
  text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.sidebar-item{
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer;
  transition:background 0.12s;
  display:flex;
  align-items:center;
  gap:10px;
}
.sidebar-item:hover{background:var(--surface2);}
.sidebar-item.active{background:rgba(230,57,70,0.08);border-left:3px solid var(--accent);padding-left:11px;}
.sidebar-item.active .si-name{color:var(--text);}
.si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-sed{background:var(--accent4);}
.dot-analg{background:var(--accent2);}
.dot-nmd{background:var(--accent3);}
.dot-hemo{background:var(--blood);}
.dot-anti{background:var(--green);}
.dot-scen{background:var(--purple);}
.si-name{font-family:var(--mono);font-size:12px;color:var(--text-muted);font-weight:500;}
.si-class{font-size:10px;color:var(--text-dim);}

/* ====== MAIN CONTENT ====== */
.main-content{
  flex:1;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.content-pad{padding:20px 24px 40px;}

/* ====== WELCOME ====== */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;color:var(--text-dim);gap:12px;padding:40px;
}
.welcome-icon{font-size:56px;line-height:1;}
.welcome h2{font-family:var(--display);font-size:32px;letter-spacing:3px;color:var(--text-muted);}
.welcome p{font-size:13px;max-width:380px;line-height:1.7;}
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-width:600px;margin-top:12px;}
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all 0.15s;}
.welcome-card:hover{border-color:var(--border2);background:var(--surface2);}
.wc-icon{font-size:22px;margin-bottom:6px;}
.wc-label{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
.wc-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}

/* ====== DRUG HEADER ====== */
.drug-header{
  display:flex;align-items:flex-start;gap:16px;
  margin-bottom:20px;padding-bottom:18px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.drug-name-big{font-family:var(--display);font-size:44px;letter-spacing:3px;color:var(--text);line-height:1;}
.drug-meta{display:flex;flex-direction:column;gap:5px;margin-top:5px;}
.badge{display:inline-block;padding:3px 10px;border-radius:3px;font-family:var(--mono);font-size:10px;letter-spacing:0.5px;font-weight:600;}
.badge-sed{background:rgba(106,103,206,0.18);color:var(--accent4);border:1px solid rgba(106,103,206,0.5);}
.badge-analg{background:rgba(244,162,97,0.18);color:var(--accent2);border:1px solid rgba(244,162,97,0.5);}
.badge-nmd{background:rgba(46,196,182,0.18);color:var(--accent3);border:1px solid rgba(46,196,182,0.5);}
.badge-hemo{background:rgba(193,41,46,0.18);color:#f87171;border:1px solid rgba(193,41,46,0.5);}
.badge-anti{background:rgba(82,183,136,0.18);color:var(--green);border:1px solid rgba(82,183,136,0.5);}
.badge-route{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.badge-avail{background:rgba(255,209,102,0.1);color:var(--yellow);border:1px solid rgba(255,209,102,0.3);}

/* ====== SECTIONS ====== */
.sections{display:grid;gap:12px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.section-header{
  padding:10px 14px;background:var(--surface2);
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  color:var(--text-muted);display:flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;transition:background 0.15s;
}
.section-header:hover{background:var(--surface3);}
.section-icon{font-size:14px;}
.section-toggle{margin-left:auto;color:var(--text-dim);font-size:11px;transition:transform 0.2s;}
.section.collapsed .section-toggle{transform:rotate(-90deg);}
.section-body{padding:14px;display:block;}
.section.collapsed .section-body{display:none;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ====== DOSE TABLE ====== */
.dose-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.dose-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px;min-width:520px;}
.dose-table th{background:var(--bg);padding:8px 12px;text-align:left;color:var(--text-dim);font-size:9px;letter-spacing:1.5px;border-bottom:1px solid var(--border);}
.dose-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:top;}
.dose-table tr:last-child td{border-bottom:none;}
.dose-table tr:hover td{background:rgba(255,255,255,0.015);}
.dose-val{color:var(--yellow);font-weight:600;}
.dose-pop{color:var(--accent3);}
.dose-note{color:var(--text-muted);font-size:10.5px;}

/* ====== LISTS ====== */
.info-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
.info-list li{padding:6px 10px;border-left:2px solid var(--border);font-size:13px;color:var(--text);line-height:1.5;}
.li-green{border-left-color:var(--green)!important;}
.li-red{border-left-color:var(--red)!important;color:#fca5a5!important;}
.li-yellow{border-left-color:var(--yellow)!important;}
.li-blue{border-left-color:var(--accent3)!important;}
.li-purple{border-left-color:var(--purple)!important;}

/* ====== ALERT ====== */
.alert{padding:11px 14px;border-radius:6px;font-size:13px;line-height:1.5;margin-bottom:10px;border-left:4px solid;}
.alert-danger{background:rgba(230,57,70,0.09);border-color:var(--red);color:#fca5a5;}
.alert-warn{background:rgba(255,209,102,0.07);border-color:var(--yellow);color:#fde68a;}
.alert-info{background:rgba(46,196,182,0.07);border-color:var(--accent3);color:#99f6e4;}
.alert-success{background:rgba(82,183,136,0.07);border-color:var(--green);color:#a7f3d0;}

/* ====== MONITORING GRID ====== */
.monitor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.monitor-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;}
.monitor-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px;}
.monitor-target{font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600;}
.monitor-note{font-size:11px;color:var(--text-dim);margin-top:3px;}

/* ====== OVERDOSE BOX ====== */
.overdose-box{background:rgba(230,57,70,0.05);border:1px solid rgba(230,57,70,0.25);border-radius:6px;padding:12px;margin-bottom:10px;}
.overdose-box h4{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--red);margin-bottom:8px;}
.antidote-box{background:rgba(82,183,136,0.08);border:1px solid rgba(82,183,136,0.35);border-radius:6px;padding:12px;margin-top:10px;font-size:13px;line-height:1.6;}
.antidote-box .at-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-bottom:6px;}
.titrate-box{background:rgba(255,209,102,0.05);border:1px solid rgba(255,209,102,0.18);border-radius:6px;padding:12px;font-size:13px;line-height:1.7;}

/* ====== SCENARIO ====== */
.scen-title{font-family:var(--display);font-size:34px;letter-spacing:2px;color:var(--purple);line-height:1.1;}
.step{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-num.drug{background:var(--yellow);color:#1a1a1a;}
.step-content{flex:1;font-size:13px;line-height:1.6;}

/* ====== CALCULATOR ====== */
.calc-wrap{max-width:680px;margin:0 auto;}
.calc-header{font-family:var(--display);font-size:34px;letter-spacing:3px;color:var(--yellow);margin-bottom:4px;}
.calc-sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:20px;}
.calc-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.calc-field label{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-dim);display:block;margin-bottom:6px;}
.calc-field input, .calc-field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;transition:border-color 0.2s;
}
.calc-field input:focus, .calc-field select:focus{border-color:var(--accent3);}
.calc-field select option{background:var(--surface2);}
.calc-btn{
  width:100%;background:var(--accent);border:none;border-radius:6px;
  padding:11px;color:#fff;font-family:var(--mono);font-size:12px;
  letter-spacing:1px;cursor:pointer;transition:background 0.15s;font-weight:600;
}
.calc-btn:hover{background:#cc2f3b;}
.calc-results{display:grid;gap:10px;}
.calc-drug-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cdc-header{padding:10px 14px;background:var(--surface2);display:flex;align-items:center;gap:10px;}
.cdc-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);}
.cdc-class{font-size:11px;color:var(--text-dim);}
.cdc-body{padding:12px 14px;display:grid;gap:6px;}
.cdc-row{display:flex;align-items:baseline;gap:10px;border-bottom:1px solid rgba(255,255,255,0.03);padding-bottom:6px;}
.cdc-row:last-child{border-bottom:none;padding-bottom:0;}
.cdc-ind{font-size:11px;color:var(--text-muted);flex:1;}
.cdc-dose{font-family:var(--mono);font-size:13px;color:var(--yellow);font-weight:600;white-space:nowrap;}
.cdc-note{font-size:10px;color:var(--text-dim);}
.cdc-warn{background:rgba(230,57,70,0.08);border-left:3px solid var(--red);padding:6px 10px;font-size:11px;color:#fca5a5;margin-top:6px;border-radius:0 4px 4px 0;}

/* ====== OVERLAY for mobile ====== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;}

/* ====== SCROLLBAR ====== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ====== MOBILE ====== */
@media(max-width:700px){
  .header{height:50px;}
  .cat-tabs{top:50px;height:38px;padding:0 6px;}
  .layout{top:88px;}
  .sidebar{
    position:fixed;top:88px;bottom:0;left:0;
    z-index:160;transform:translateX(-100%);
    width:260px;min-width:260px;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.active{display:block;}
  .burger{display:flex;align-items:center;}
  .logo{font-size:20px;}
  .header-tag{display:none;}
  .main-content{width:100%;}
  .content-pad{padding:14px 14px 40px;}
  .drug-name-big{font-size:32px;}
  .two-col{grid-template-columns:1fr;}
  .calc-inputs{grid-template-columns:1fr 1fr;}
  .welcome-grid{grid-template-columns:repeat(2,1fr);}
  .search-wrap{max-width:none;}
}
@media(min-width:701px){
  .header-tag{display:inline-block;}
}

.hidden{display:none!important;}
strong{font-weight:600;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="burger" id="burgerBtn" onclick="toggleSidebar()">☰</button>
  <div class="logo">ER RX <span class="logo-sub">INDONESIA · CRITICAL DRUG REF v2</span></div>
  <span class="header-tag">⚕ FOR LICENSED PHYSICIANS ONLY</span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-bar" id="searchInput" type="text" placeholder="Search drug, class..." oninput="renderSidebar()">
  </div>
</div>

<!-- CAT TABS -->
<div class="cat-tabs" id="catTabs"></div>

<!-- OVERLAY -->
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content" id="mainContent">
    <div id="welcomePanel" class="content-pad" style="height:100%;display:flex;flex-direction:column;justify-content:center;"></div>
    <div id="drugPanel" class="content-pad hidden"></div>
    <div id="scenarioPanel" class="content-pad hidden"></div>
    <div id="calcPanel" class="content-pad hidden"></div>
  </div>
</div>

    {text:'SEIZURES: Benzodiazepine first line — Midazolam 5 mg IV OR Diazepam 10 mg IV. Avoid propofol at large doses (can worsen CVS instability in bupivacaine toxicity).'},
    {text:'CARDIOVASCULAR TOXICITY (arrhythmia, wide QRS, bradycardia, asystole — especially bupivacaine):',drug:true},
    {text:'→ LIPID EMULSION THERAPY (Intralipid 20%) — IMMEDIATELY: Bolus 1.5 mL/kg IV over 1 min (= 100 mL, 70 kg). Then infusion 0.25 mL/kg/min = 18 mL/min. Repeat bolus q5 min if CVS unstable (max 3 boluses). Max cumulative dose 12 mL/kg.'},
    {text:'CARDIAC ARREST from LAST: ADVANCED CPR + Lipid emulsion. Adrenaline in SMALL doses (≤1 mcg/kg — large doses worsen). AVOID vasopressin, calcium channel blockers, beta-blockers.'},
    {text:'Continue lipid emulsion until hemodynamic stability maintained ≥5 min.'},
    {text:'CALL ANESTHESIA/INTENSIVIST IMMEDIATELY for ECMO consideration in refractory cases (bupivacaine cardiac arrest).'},
  ],
  pearls:['Bupivacaine is the most cardiotoxic LA — wide QRS ventricular arrhythmia is classic','Lipid emulsion is the specific treatment — have Intralipid 20% stocked wherever regional anesthesia is done','Propofol is NOT a substitute for lipid emulsion — it contains lipid but concentration too low','Log on to lipidrescue.org for real-time dosing guidance']
},
{
  id:'hyperkalemia', common:false,
  title:'⚡ SEVERE HYPERKALEMIA (K+ >6.5 mEq/L + ECG changes)',
  subtitle:'Rare but immediately life-threatening cardiac emergency',
  steps:[
    {text:'DIAGNOSE: ECG changes are KEY — peaked T waves → wide QRS → sine wave → VF. K+ >6.5 or any K+ with ECG changes requires immediate treatment.'},
    {text:'CARDIAC MEMBRANE STABILIZATION — FIRST (within 5 min):',drug:true},
    {text:'→ Calcium Chloride 1 g IV (10 mL of 10%) over 5–10 min. OR Calcium Gluconate 3 g IV over 10 min. Onset: 1–3 min. Does NOT lower K+, just stabilizes cardiac membrane. Repeat if no ECG improvement in 5 min.'},
    {text:'SHIFT K+ INTO CELLS:',drug:true},
    {text:'→ Insulin + Dextrose: Regular insulin 10 units IV + D50 50 mL IV (or D10 500 mL). Onset 20–30 min. Monitor BGL q1h.'},
    {text:'→ Salbutamol (Albuterol) 10–20 mg nebulized (3–4× standard dose). Onset 20–30 min. Additive with insulin.'},
    {text:'→ NaHCO3 50–100 mEq IV: Only effective in metabolic acidosis; controversial in normal pH.'},
    {text:'REMOVE K+ FROM BODY:',drug:true},
    {text:'→ DIALYSIS: Most effective. Emergency dialysis if refractory or severe renal failure.'},
    {text:'→ Furosemide 40–80 mg IV if not oliguric.'},
    {text:'→ Calcium Resonium (K+ exchange resin) 15–30 g PO/PR — slower effect (hours), not for acute emergency.'},
    {text:'AVOID SUCCINYLCHOLINE for intubation — raises K+ by 0.5–1 mEq/L. Use ROCURONIUM 1.2 mg/kg.'},
    {text:'MONITOR: ECG continuous, K+ q1–2hr, glucose if insulin given, urine output.'},
  ],
  pearls:['ECG changes matter more than absolute K+ value — ECG abnormality = emergency regardless of exact level','Calcium is the ONLY drug that protects the heart immediately — give first','Insulin + dextrose + salbutamol triple combination lowers K+ fastest non-dialysis approach','NEVER use succinylcholine for RSI in hyperkalemia — rocuronium is the safe alternative']
},
];

// ================================================================
// STATE
// ================================================================
let curCat = 'all';
let curDrug = null;
let curScene = null;
let curPanel = 'welcome';

// ================================================================
// CATEGORY CONFIG
// ================================================================
const CATS = [
  {id:'all',    label:'ALL DRUGS'},
  {id:'sedative',label:'SEDATIVES',dotCls:'dot-sed'},
  {id:'analgesic',label:'ANALGESICS',dotCls:'dot-analg'},
  {id:'nmd',    label:'NMB',dotCls:'dot-nmd'},
  {id:'hemostatic',label:'HEMOSTATICS',dotCls:'dot-hemo'},
  {id:'antidote',label:'ANTIDOTES',dotCls:'dot-anti'},
  {id:'scenario',label:'SCENARIOS',dotCls:'dot-scen'},
  {id:'calculator',label:'⚖ DOSE CALC'},
];

// ================================================================
// INIT
// ================================================================
function init() {
  // Cat tabs
  const tabs = document.getElementById('catTabs');
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab';
    btn.dataset.cat = c.id;
    btn.textContent = c.label;
    btn.onclick = () => selectCat(c.id);
    tabs.appendChild(btn);
  });
  tabs.querySelector('[data-cat="all"]').classList.add('active');
  renderSidebar();
  renderWelcome();
}

function selectCat(id) {
  curCat = id;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.cat-tab[data-cat="${id}"]`).classList.add('active');
  curDrug = null; curScene = null;
  renderSidebar();
  if (id === 'calculator') { showCalc(); return; }
  if (id === 'scenario') { showWelcome(); return; }
  showWelcome();
}

// ================================================================
// SIDEBAR
// ================================================================
function dotCls(cat) {
  const map = {sedative:'dot-sed',analgesic:'dot-analg',nmd:'dot-nmd',hemostatic:'dot-hemo',antidote:'dot-anti'};
  return map[cat]||'dot-sed';
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const q = document.getElementById('searchInput').value.toLowerCase();
  sb.innerHTML = '';

  if (curCat === 'calculator') return;

  if (curCat === 'scenario') {
    const grps = [{label:'● COMMON SCENARIOS', common:true},{label:'◦ RARE / SPECIFIC', common:false}];
    grps.forEach(g => {
      const filtered = SCENARIOS.filter(s=>s.common===g.common && (q===''||s.title.toLowerCase().includes(q)||s.subtitle.toLowerCase().includes(q)));
      if (!filtered.length) return;
      const lbl = document.createElement('div');
      lbl.className='sidebar-group-label';
      lbl.textContent=g.label;
      sb.appendChild(lbl);
      filtered.forEach(s=>{
        const el = document.createElement('div');
        el.className=`sidebar-item${curScene===s.id?' active':''}`;
        el.onclick=()=>showScenario(s.id);
        el.innerHTML=`<div class="si-dot dot-scen"></div><div><div class="si-name" style="font-size:11px">${s.title}</div><div class="si-class">${s.subtitle.substring(0,40)}…</div></div>`;
        sb.appendChild(el);
      });
    });
    return;
  }

  const catGroups = ['sedative','analgesic','nmd','hemostatic','antidote'];
  catGroups.forEach(cat=>{
    if (curCat !== 'all' && curCat !== cat) return;
    const filtered = DRUGS.filter(d=>d.cat===cat&&(q===''||d.name.toLowerCase().includes(q)||d.class.toLowerCase().includes(q)));
    if (!filtered.length) return;
    const labels = {sedative:'SEDATIVES / INDUCTION',analgesic:'ANALGESICS',nmd:'NEUROMUSCULAR BLOCKERS',hemostatic:'HEMOSTATICS',antidote:'ANTIDOTES'};
    const lbl = document.createElement('div');
    lbl.className='sidebar-group-label';
    lbl.textContent=labels[cat]||cat.toUpperCase();
    sb.appendChild(lbl);
    filtered.forEach(d=>{
      const el=document.createElement('div');
      el.className=`sidebar-item${curDrug===d.id?' active':''}`;
      el.onclick=()=>showDrug(d.id);
      el.innerHTML=`<div class="si-dot ${dotCls(d.cat)}"></div><div><div class="si-name">${d.name}</div><div class="si-class">${d.class}</div></div>`;
      sb.appendChild(el);
    });
  });
}

// ================================================================
// PANELS
// ================================================================
function switchPanel(name) {
  ['welcomePanel','drugPanel','scenarioPanel','calcPanel'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  document.getElementById(name+'Panel').classList.remove('hidden');
  curPanel = name;
  document.getElementById('mainContent').scrollTop = 0;
}

function showWelcome() { switchPanel('welcome'); renderWelcome(); }

function renderWelcome() {
  const p = document.getElementById('welcomePanel');
  p.innerHTML = `<div class="welcome">
    <div class="welcome-icon">💉</div>

      <div class="welcome-card" onclick="selectCat('scenario')"><div class="wc-icon">📋</div><div class="wc-label">SCENARIOS</div><div class="wc-sub">${SCENARIOS.length} cases</div></div>
      <div class="welcome-card" onclick="selectCat('calculator')"><div class="wc-icon">⚖</div><div class="wc-label">DOSE CALC</div><div class="wc-sub">All drugs</div></div>
    </div>
    <p style="font-size:11px;color:var(--text-dim);margin-top:12px;font-family:var(--mono)">⚠ For licensed medical personnel only. Verify doses with local formulary.</p>

// ================================================================
// DRUG DETAIL
// ================================================================
function badgeClass(cat) { return {sedative:'badge-sed',analgesic:'badge-analg',nmd:'badge-nmd',hemostatic:'badge-hemo',antidote:'badge-anti'}[cat]||'badge-sed'; }
function catLabel(cat) { return {sedative:'SEDATIVE / INDUCTION',analgesic:'ANALGESIC',nmd:'NEUROMUSCULAR BLOCKER',hemostatic:'HEMOSTATIC',antidote:'ANTIDOTE'}[cat]||cat.toUpperCase(); }

function showDrug(id) {
  curDrug = id; curScene = null;
  renderSidebar();
  closeSidebar();
  const d = DRUGS.find(x=>x.id===id);
  if (!d) return;
  const panel = document.getElementById('drugPanel');
  const routes = d.routes.map(r=>`<span class="badge badge-route">${r}</span>`).join(' ');

  panel.innerHTML = `
  <div class="drug-header">
    <div>
      <div class="drug-name-big">${d.name.toUpperCase()}</div>
      <div class="drug-meta">
        <div><span class="badge ${badgeClass(d.cat)}">${catLabel(d.cat)}</span></div>
        <div style="color:var(--text-muted);font-family:var(--mono);font-size:11px;margin-top:3px">${d.class}</div>
        <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${routes}</div>
        <div style="margin-top:5px"><span class="badge badge-avail">📦 ${d.avail}</span></div>
      </div>
    </div>
  </div>
  <div class="sections">
    ${makeSection('⚙️','MECHANISM',`<p style="font-size:13px;line-height:1.7">${d.mech}</p>`,false)}
    <div class="two-col">
      ${makeSection('✅','INDICATIONS',`<ul class="info-list">${d.indications.map(i=>`<li class="li-green">${i}</li>`).join('')}</ul>`,false)}
      ${makeSection('🚫','CONTRAINDICATIONS',`<ul class="info-list">${d.contraindications.map(i=>`<li class="li-red">${i}</li>`).join('')}</ul>`,false)}
    </div>
    ${makeSection('💡','PEARLS & PITFALLS',`<ul class="info-list">${d.pearls.map(p=>`<li class="${p.startsWith('✅')?'li-blue':'li-yellow'}">${p}</li>`).join('')}</ul>`,false)}
    ${makeSection('💊','DOSING BY POPULATION',`<div class="dose-wrap"><table class="dose-table">
      <thead><tr><th>POPULATION</th><th>INDICATION</th><th>DOSE</th><th>TITRATION</th><th>NOTES</th></tr></thead>
      <tbody>${d.doses.map(r=>`<tr><td class="dose-pop">${r.pop}</td><td style="color:var(--text-muted)">${r.ind}</td><td class="dose-val">${r.dose}</td><td style="color:var(--accent3);font-size:11px">${r.titrate}</td><td class="dose-note">${r.note}</td></tr>`).join('')}</tbody>
    </table></div>`,false)}
    ${makeSection('📈','TITRATION GUIDANCE',`<div class="titrate-box">${d.titrate}</div>`,false)}
    ${makeSection('📊','MONITORING',`<div class="monitor-grid">${d.monitoring.map(m=>`<div class="monitor-card"><div class="monitor-label">${m.l}</div><div class="monitor-target">${m.t}</div><div class="monitor-note">${m.n}</div></div>`).join('')}</div>`,false)}
    ${makeSection('☠️','OVERDOSE & MANAGEMENT',`
      <div class="overdose-box"><h4>⚠ SIGNS OF OVERDOSE / TOXICITY</h4><ul class="info-list">${d.overdose.signs.map(s=>`<li class="li-red">${s}</li>`).join('')}</ul></div>
      <div style="margin-top:10px"><div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-bottom:6px">MANAGEMENT</div><ul class="info-list">${d.overdose.mgmt.map(m=>`<li class="li-yellow">${m}</li>`).join('')}</ul></div>
      <div class="antidote-box"><div class="at-label">🧪 ANTIDOTE / REVERSAL AGENT</div>${d.overdose.antidote}</div>

function makeSection(icon, title, body, collapsed=false) {
  return `<div class="section${collapsed?' collapsed':''}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="section-icon">${icon}</span> ${title}
      <span class="section-toggle">▾</span>
    </div>
    <div class="section-body">${body}</div>
  </div>`;
}

// ================================================================
// SCENARIO
// ================================================================
function showScenario(id) {
  curScene = id; curDrug = null;
  renderSidebar();
  closeSidebar();

  if (!s) return;
  const panel = document.getElementById('scenarioPanel');
  panel.innerHTML = `
  <div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)">
    <div class="scen-title">${s.title}</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:5px">${s.subtitle}</div>
    <div style="margin-top:8px"><span class="badge" style="background:rgba(155,114,207,0.15);border:1px solid rgba(155,114,207,0.4);color:var(--purple)">${s.common?'● COMMON':'◦ RARE / SPECIFIC'}</span></div>
  </div>
  <div style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px">STEP-BY-STEP MANAGEMENT</div>

    <div class="section-body">
      ${s.steps.map((st,i)=>`<div class="step"><div class="step-num${st.drug?' drug':''}">${i+1}</div><div class="step-content" style="${st.drug?'color:var(--yellow);font-weight:600':'color:var(--text)'}">${st.text}</div></div>`).join('')}

  </div>

// ================================================================
// CALCULATOR
// ================================================================
function showCalc() {
  switchPanel('calc');
  renderCalcUI();
}

function renderCalcUI() {
  const panel = document.getElementById('calcPanel');
  const drugOptions = DRUGS.map(d=>`<option value="${d.id}">${d.name} (${d.class.split('—')[0].trim()})</option>`).join('');
  panel.innerHTML = `
  <div class="calc-wrap">
    <div class="calc-header">DOSE CALCULATOR</div>
    <div class="calc-sub">Weight-based dosing for ER drugs. Enter patient details to calculate doses.</div>
    <div class="calc-inputs">
      <div class="calc-field">
        <label>WEIGHT (KG)</label>
        <input type="number" id="calcWeight" placeholder="e.g. 65" min="1" max="200" value="">
      </div>
      <div class="calc-field">
        <label>AGE (YEARS)</label>
        <input type="number" id="calcAge" placeholder="e.g. 35" min="0" max="120" value="">
      </div>
      <div class="calc-field">
        <label>DRUG CATEGORY</label>
        <select id="calcCat" onchange="renderCalcResults()">
          <option value="all">ALL DRUGS</option>
          <option value="sedative">Sedatives</option>
          <option value="analgesic">Analgesics</option>
          <option value="nmd">NM Blockers</option>
          <option value="hemostatic">Hemostatics</option>
          <option value="antidote">Antidotes</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="renderCalcResults()">⚖ CALCULATE DOSES</button>
    <div class="calc-results" id="calcResults" style="margin-top:18px"></div>
  </div>`;
}

function renderCalcResults() {
  const wInput = document.getElementById('calcWeight');
  const aInput = document.getElementById('calcAge');
  const catSel = document.getElementById('calcCat');
  const w = parseFloat(wInput.value);
  const age = parseFloat(aInput.value)||null;
  const cat = catSel.value;
  const container = document.getElementById('calcResults');

  if (!w || w<1 || w>300) {
    container.innerHTML = `<div class="alert alert-warn">⚠ Please enter a valid weight (1–300 kg) to calculate doses.</div>`;
    return;
  }

  const drugs = DRUGS.filter(d=>cat==='all'||d.cat===cat).filter(d=>d.calcDoses&&d.calcDoses.length>0);

  if (!drugs.length) { container.innerHTML='<div class="alert alert-info">No drugs with calculator data for this category.</div>'; return; }

  // Age-based notes
  let ageNote = '';
  if (age !== null) {
    if (age < 1) ageNote = '⚠ INFANT (<1yr): Use higher mg/kg doses for succinylcholine/ketamine. Consult peds dosing. Atropine pre-treatment for bradycardia.';
    else if (age < 12) ageNote = '⚠ CHILD: Succinylcholine 2 mg/kg (not 1.5). Ketamine IM 4–5 mg/kg preferred. Higher propofol induction doses.';
    else if (age > 65) ageNote = '⚠ ELDERLY (>65yr): Reduce all sedative/opioid doses by 30–50%. Hypotension risk with propofol. Benzodiazepines cause prolonged sedation.';
    else if (age >= 12 && age < 18) ageNote = 'ADOLESCENT: Use weight-based adult dosing. Tramadol not recommended <12yr.';
  }

  let html = '';
  if (ageNote) html += `<div class="alert alert-warn">${ageNote}</div>`;

  const patientInfo = `<div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:14px;padding:10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)">
    PATIENT: <span style="color:var(--yellow)">${w} kg</span> ${age?`| AGE: <span style="color:var(--accent3)">${age} yr</span>`:''}
    ${age&&age<18?` | <span style="color:var(--accent2)">PEDIATRIC</span>`:''}
    ${age&&age>65?` | <span style="color:var(--accent2)">ELDERLY</span>`:''}
  </div>`;
  html += patientInfo;

  drugs.forEach(d => {
    const rows = d.calcDoses.map(cd=>{
      const result = cd.formula(w, age);
      const flag = cd.flag ? cd.flag(w, age) : null;
      const doseStr = result.low===result.high ? `${result.low} ${result.unit}` : `${result.low}–${result.high} ${result.unit}`;
      return `<div class="cdc-row">
        <div class="cdc-ind">${cd.ind}</div>
        <div>
          <div class="cdc-dose">${doseStr}</div>
          ${result.note?`<div class="cdc-note">${result.note}</div>`:''}
          ${flag?`<div class="cdc-warn">${flag}</div>`:''}
        </div>
      </div>`;
    }).join('');
    html += `<div class="calc-drug-card">
      <div class="cdc-header">
        <div class="si-dot ${dotCls(d.cat)}"></div>
        <div>
          <div class="cdc-name">${d.name}</div>
          <div class="cdc-class">${d.class}</div>
        </div>
      </div>
      <div class="cdc-body">${rows}</div>
    </div>`;
  });

  html += `<div class="alert alert-warn" style="margin-top:4px">⚠ Calculated doses are guidelines. Adjust for clinical context, renal/hepatic impairment, and comorbidities. Always verify with institutional formulary.</div>`;
  container.innerHTML = html;
}

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
